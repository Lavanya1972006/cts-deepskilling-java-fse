server.port=8083

spring.application.name=api-gateway-resilience

spring.cloud.gateway.server.webflux.routes[0].id=example_route
spring.cloud.gateway.server.webflux.routes[0].uri=http://example.org
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/example/**

resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50



